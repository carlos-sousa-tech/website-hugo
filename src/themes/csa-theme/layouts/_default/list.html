{{ define "main" }}
<ul>
{{ range .Pages.ByPublishDate.Reverse }}
    <li>
        <a href="{{ .RelPermalink }}">
            {{ .Title }}
            {{ if .Params.subtitle }}
            <span class="subtitle"> - {{ .Params.subtitle }}</span>
            {{ end}}
        </a>
    </li>
{{ end }}
</ul>
{{ end }}
