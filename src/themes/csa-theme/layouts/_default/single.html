{{ define "main" }}
<article class="main">
  <header>
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ if .PublishDate }}
      <span>{{ time.Format "January 2, 2006" .PublishDate }}</span>
      {{ end }}
      {{ if .Params.Tags }}
      <span>{{ partial "tags.html" . -}}</span>
      {{ end }}
    </div>
    {{ if .Summary }}
    <p class="summary">{{ .Summary }}</p>
    {{ end }}
  </header>
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
