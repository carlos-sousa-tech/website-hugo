<li class="list-item">
    <h3>
        <a href="{{ .RelPermalink }}">
            {{ .Title }}
        </a>
    </h3>
    {{ if .PublishDate }}
    <p>Posted on {{ time.Format "2th January, 2006" .PublishDate }}</p>
    {{ end }}
    {{ if .Params.Tags }}
    <p><b>Tags:</b> {{ partial "tags.html" . -}}</p>
    {{ end }}
    {{ if .Summary }}
    <p><b>Summary:</b> {{ .Summary }}</p>
    {{ end }}
</li>
