when:
  branch: develop
  event: [ push, manual ]

steps:
  - name: docker-build
    image: docker:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build -t test-build:latest .
      - docker run --rm test-build:latest echo "Build successful!"
      - echo "hey!"
    when:
      branch: develop
      event: [ push, manual ]
